<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#0f766e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="旋律配和弦">
    <title>旋律配和弦</title>
    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>旋律配和弦</h1>
        </div>
        <label>
          调性
          <select id="key"></select>
        </label>
        <label>
          拍号
          <select id="meter">
            <option value="4/4">4/4</option>
            <option value="2/4">2/4</option>
            <option value="3/4">3/4</option>
            <option value="3/8">3/8</option>
          </select>
        </label>
        <label>
          版本
          <select id="style">
            <option value="pop">流行版</option>
            <option value="jazz">爵士色彩版</option>
          </select>
        </label>
        <label>
          音响
          <select id="texture">
            <option value="arpeggio">分解式</option>
            <option value="slowArpeggio">慢琶音</option>
            <option value="block">柱式</option>
          </select>
        </label>
        <label>
          速度
          <select id="speed">
            <option value="fast">快速</option>
            <option value="medium" selected>中速</option>
            <option value="slow">慢速</option>
          </select>
        </label>
        <label>
          旋律音色
          <select id="melodyTone">
            <option value="clarinet">单簧管</option>
            <option value="piano">钢琴</option>
            <option value="violin">小提琴</option>
          </select>
        </label>
        <label>
          旋律音量
          <select id="melodyVolume">
            <option value="0">0%</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
          </select>
        </label>
        <label>
          和声音色
          <select id="harmonyTone">
            <option value="piano">钢琴</option>
            <option value="violin">小提琴</option>
            <option value="clarinet">单簧管</option>
          </select>
        </label>
        <label>
          和声音量
          <select id="harmonyVolume">
            <option value="0">0%</option>
            <option value="0.5">50%</option>
            <option value="0.75">75%</option>
            <option value="1" selected>100%</option>
          </select>
        </label>
        <button id="generate" class="primary">输出和弦</button>
        <button id="play" title="播放">播放</button>
        <button id="stop" title="停止">停止</button>
        <button id="undo" title="撤销">撤销</button>
        <button id="delete" title="删除最后一个音">删除</button>
        <button id="clear" title="清空">清空</button>
      </header>

      <section class="editor-wrap">
        <div id="editor" class="editor" aria-label="旋律编辑区"></div>
      </section>

      <section class="input-panel">
        <div class="duration-group">
          <span class="panel-label">时值</span>
          <div id="durations" class="duration-buttons"></div>
          <button id="dotted" class="dot-button" title="给当前时值加附点">附点</button>
          <button id="rest" class="rest-button">休止符</button>
        </div>
        <div id="keyboard" class="keyboard" aria-label="虚拟钢琴键盘"></div>
      </section>

      <p id="message" class="message"></p>
    </main>

    <aside id="replacementPanel" class="replacement-panel" hidden>
      <h2 id="replacementTitle"></h2>
      <div id="replacementOptions" class="replacement-options"></div>
    </aside>

    <script type="module" src="./src/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
